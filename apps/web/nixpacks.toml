[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]
cacheDirectories = ["node_modules", "apps/web/node_modules", "packages/db/node_modules"]

[phases.build]
cmds = [
  "npm run build --workspace=@connext/db",
  "npm run build --workspace=connext-web"
]

[start]
cmd = "npm run start --workspace=connext-web"
